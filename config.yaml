# ORBench Configuration

# LLM Settings
llm:
  model: "claude-sonnet-4-20250514"
  api_base: "https://api.anthropic.com/v1/messages"
  max_tokens: 8192
  num_samples: 3          # samples per task for pass@k
  temperature: 0.7

# Evaluation Settings
eval:
  num_gpu_devices: 1
  num_cpu_workers: 8      # for parallel compilation
  timeout: 180            # per-task timeout in seconds
  warmup: 3
  num_trials: 10

# GPU Architecture
gpu:
  arch: "sm_89"           # L20X / RTX 4090
  # arch: "sm_80"         # A100

# Paths
paths:
  tasks_dir: "tasks"
  runs_dir: "runs"
  cache_dir: "cache"

# Profiling
profiling:
  nsys_enabled: true      # nsys trace (recommended, works in containers)
  ncu_enabled: false      # NCU roofline (requires SYS_ADMIN, physical machine only)
  nsys_timeout: 60
