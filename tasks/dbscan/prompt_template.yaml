  ### 3. Cluster Expansion Strategy
  Two approaches:
  - **CPU-driven expansion + GPU neighbor search**: CPU maintains seed queue,
    launches GPU kernel per expansion step (simpler but kernel launch overhead)
  - **Fully GPU expansion**: Multiple thread blocks each expand one cluster
    simultaneously, merge conflicts on CPU (matches CUDA-DClust+ approach)

  ### 4. Atomic Cluster Assignment
  ```cuda
  atomicCAS(&labels[j], UNCLASSIFIED, cluster_id);
  ```
  Use compare-and-swap to avoid race conditions when multiple clusters
  try to claim the same point.
