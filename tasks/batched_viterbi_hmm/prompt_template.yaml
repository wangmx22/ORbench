# Batched Viterbi HMM -- Prompt Template

task_description: |
  Decode a batch of observation sequences with the Viterbi algorithm for a Hidden Markov Model (HMM).

  All sequences share the same HMM parameters:
    - log_init: length H
    - log_trans: shape H x H, row-major, transition log-probabilities from prev_state to next_state
    - log_emit: shape H x V, row-major, emission log-probabilities

  The input observations are stored in a flattened int32 array observations of shape B x T in row-major order.
  The output is the most likely hidden-state path for every sequence, also flattened in row-major order.

interface: |
  ```c
  extern "C" void solution_compute(
      int B,
      int T,
      int H,
      int V,
      const float* log_init,      // host, [H]
      const float* log_trans,     // host, [H * H]
      const float* log_emit,      // host, [H * V]
      const int* observations,    // host, [B * T]
      int* out_path               // host, [B * T]
  );

  extern "C" void solution_free(void);
  ```

input_size_notes: |
  - small:  B = 256,  T = 64,  H = 32, V = 16
  - medium: B = 768,  T = 96,  H = 32, V = 20
  - large:  B = 1536, T = 128, H = 32, V = 24
  - All sequences in the batch have the same length T
  - The same HMM is reused for the entire batch

output_contract: |
  - `out_path` must contain the exact Viterbi-decoded state sequence for every batch element
  - Layout is row-major: out_path[b * T + t]
  - The function must be deterministic and synchronize before returning

algorithm_background: |
  The Viterbi recurrence is:

    dp_next[j] = max_i (dp_prev[i] + log_trans[i, j]) + log_emit[j, obs_t]

  with initialization:

    dp_0[j] = log_init[j] + log_emit[j, obs_0]

  In addition to the max value, the algorithm stores a backpointer for each (time, state)
  giving the predecessor state that attained the maximum. After all time steps, it finds the
  best final state and backtracks to recover the optimal hidden-state path.

hints_l2: |
  - Parallelize across sequences first; different sequences are independent
  - Within a sequence and time step, parallelize across destination states j
  - For each destination state, reduce over predecessor states i
  - Use two DP buffers (previous and current) and a backpointer tensor for traceback

hints_l1: |
  ### 1. Row-major layouts
  - log_trans[i * H + j] is the transition from state i to state j
  - log_emit[j * V + obs] is the emission score of symbol obs from state j
  - observations[b * T + t] is the t-th symbol of sequence b

  ### 2. Backpointers
  Store the argmax predecessor for every (sequence, time, state). After the final time step,
  trace backward from the best final state.

  ### 3. Buffer reuse
  Only the previous and current DP rows are needed during the forward pass, so a ping-pong
  two-buffer design is sufficient.
