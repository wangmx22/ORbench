# PageRank Power Iteration -- Prompt Template

task_description: |
  Compute PageRank scores on a directed graph using fixed-count power iteration.

  The graph is provided in inbound CSR form. For each destination vertex `v`, the inbound
  neighbors are listed in `col_ind_in[row_ptr_in[v] : row_ptr_in[v+1]]`. The array
  `inv_out_deg[u]` stores `1.0 / out_degree[u]` for each source vertex `u`.

  Initialize all ranks uniformly to `1 / N`. Then run exactly `iters` iterations of:

    new_rank[v] = (1 - d) / N + d * sum_{u in In(v)} rank[u] * inv_out_deg[u]

  where `d = damping_x1e6 / 1e6`.

interface: |
  ```c
  extern "C" void solution_compute(
      int N,
      int M,
      int iters,
      int damping_x1e6,
      const int* row_ptr_in,    // [N+1], inbound CSR row pointer
      const int* col_ind_in,    // [M], source vertex for each inbound edge
      const float* inv_out_deg, // [N], 1 / out_degree[source]
      float* out                // [N], final ranks
  );

  extern "C" void solution_free(void);
  ```

input_size_notes: |
  - small:  N=4096,   avg out-degree=8,  iters=30
  - medium: N=32768,  avg out-degree=16, iters=40
  - large:  N=131072, avg out-degree=16, iters=50
  - `M` is the number of edges
  - `d = damping_x1e6 / 1e6`

output_contract: |
  - `out[v]` must equal the PageRank score of vertex `v` after exactly `iters` power iterations
  - Start from the uniform distribution `1/N`
  - The function must synchronize before returning
  - Output layout is one float per vertex in vertex order

algorithm_background: |
  PageRank is a sparse iterative graph algorithm. Each iteration reads the previous rank vector
  and computes a new one using inbound contributions. This is a classic sparse gather pattern.

  For each vertex v:
    acc = 0
    for e in [row_ptr_in[v], row_ptr_in[v+1]):
        u = col_ind_in[e]
        acc += rank[u] * inv_out_deg[u]
    new_rank[v] = base + d * acc

  where base = (1-d)/N. Two rank buffers are typically used and swapped after each iteration.

hints_l2: |
  - Copy CSR arrays and rank buffers to the GPU at the start of `solution_compute`
  - Use two rank vectors and ping-pong across iterations
  - Parallelize across vertices, with each thread or warp handling one destination vertex
  - Use the inbound CSR layout directly to gather contributions
  - Copy the final rank vector back to host at the end

hints_l1: |
  ### 1. Buffer strategy
  Allocate two `N`-length float rank buffers on device memory. Initialize the first to `1/N`.
  For each iteration, read from `rank_cur`, write to `rank_next`, then swap.

  ### 2. Vertex-parallel kernel
  A simple baseline is one thread per destination vertex `v`.
  That thread walks `row_ptr_in[v] .. row_ptr_in[v+1]` and accumulates inbound contributions.

  ### 3. Numerical details
  Compute:
    d = damping_x1e6 / 1e6f
    base = (1.0f - d) / N
  Then set:
    rank_next[v] = base + d * acc

  ### 4. Possible optimization
  High-degree vertices can benefit from warp-cooperative or block-cooperative reductions,
  but a correct baseline can start with a single-thread gather per vertex.
