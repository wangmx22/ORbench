# 2D Heat Diffusion (Jacobi Stencil) -- Prompt Template

task_description: |
  Simulate heat diffusion on a 2D grid using an explicit 5-point stencil for T Jacobi iterations.

  The input is an initial temperature field `u0` stored in row-major order on an `H x W` grid.
  Boundary cells remain fixed for all time steps. For each iteration, every interior cell updates from
  the previous grid:

    u_new[i,j] = u[i,j] + alpha * (u[i-1,j] + u[i+1,j] + u[i,j-1] + u[i,j+1] - 4*u[i,j])

  After T iterations, write the final grid to `out` in row-major order.

interface: |
  ```c
  extern "C" void solution_compute(
      int H,
      int W,
      int T,
      int alpha_x1e6,
      const float* u0,   // host, [H*W], row-major input grid
      float* out         // host, [H*W], row-major final grid
  );

  extern "C" void solution_free(void);
  ```

input_size_notes: |
  - small:  128 x 128 grid, 100 iterations
  - medium: 512 x 512 grid, 120 iterations
  - large:  1024 x 1024 grid, 160 iterations
  - `alpha = alpha_x1e6 / 1e6`
  - Boundary cells stay fixed across all iterations

output_contract: |
  - `out` must contain the final temperature field after exactly T Jacobi iterations
  - Layout is row-major, same as the input grid
  - Boundary cells must equal the original boundary values
  - The function must be idempotent and must synchronize before returning

algorithm_background: |
  This is the classical 2D heat equation discretized with an explicit finite-difference method.
  The spatial stencil is the standard 5-point Laplacian. A Jacobi implementation uses two buffers:
  read from the current grid, write to the next grid, and swap after each iteration.

  For each time step and interior cell (i, j):
    center = u[i,j]
    lap = u[i-1,j] + u[i+1,j] + u[i,j-1] + u[i,j+1] - 4*center
    u_new[i,j] = center + alpha * lap

hints_l2: |
  - Copy the input grid to device memory at the start of `solution_compute`
  - Use two device buffers and ping-pong them across iterations
  - Launch a 2D kernel over the grid for each time step
  - Keep boundary cells unchanged
  - Copy the final buffer back to host at the end

hints_l1: |
  ### 1. Buffer strategy
  Allocate two `H*W` float buffers on the GPU. Copy `u0` into the first buffer.
  For each step, read from `cur`, write to `next`, then swap pointers.

  ### 2. 2D kernel mapping
  Use a 2D block/grid layout. Map each thread to one cell `(i, j)`.
  Skip out-of-range threads and copy boundary cells directly.

  ### 3. Memory optimization
  This is a classic stencil kernel: consider using shared-memory tiles with a 1-cell halo.
  A tiled kernel reduces redundant global loads from neighboring cells.

  ### 4. Row-major addressing
  Flatten `(i, j)` as `idx = i * W + j`.
  Neighbor indices are `idx-W`, `idx+W`, `idx-1`, `idx+1`.
