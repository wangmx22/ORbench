task_description: |
  Compute the exact traveling salesman tour cost for a batch of complete weighted graphs using the Held-Karp subset dynamic programming algorithm.
  For each instance, city 0 is the fixed start/end depot. The algorithm must visit every city exactly once and return to city 0.

  The DP state is:
    dp[mask][j] = minimum cost to start at city 0, visit exactly the subset `mask` of cities from {1, ..., n-1}, and end at city `j`.
  Here `mask` is a bitmask over cities 1..n-1, and city `j` must be included in `mask`.

  Recurrence:
    dp[{j}][j] = cost[0][j]
    dp[mask][j] = min over k in mask \ {j} of dp[mask \ {j}][k] + cost[k][j]

  Final answer for one graph:
    min over j in {1, ..., n-1} of dp[full_mask][j] + cost[j][0]

  Each graph is independent and should produce one integer optimal tour cost.

interface: |
  void solution_compute(int B, int n, const int* costs, int* tour_costs_out);

input_size_notes: |
  - `B` is the batch size (up to ~8 exact TSP instances per call).
  - `n` is the number of cities in each complete graph (up to ~21 in the large case).
  - `costs` stores `B * n * n` int32 entries in row-major order.
  - The dynamic program has O(n^2 * 2^(n-1)) work per instance, so the state space grows exponentially.
  - This is intentionally a high-difficulty exact combinatorial optimization benchmark.

output_contract: |
  - Write exactly `B` integers into `tour_costs_out`.
  - `tour_costs_out[b]` must equal the optimal Hamiltonian tour cost for graph `b`, starting and ending at city 0.
  - Output order must match the batch order in `costs`.
  - Results must be exact integers.

algorithm_background: |
  The classic Held-Karp algorithm solves TSP exactly with subset dynamic programming.
  A natural GPU strategy is to process one subset cardinality layer at a time.
  For a fixed cardinality `s`, all states with `|mask| = s` are independent once the previous layer `s-1` is available.
  Each state performs a reduction over predecessor cities.

  Pseudocode for one graph:
    initialize dp[1<<(j-1)][j] = cost[0][j]
    for subset size s = 2 .. n-1:
      for each mask with popcount(mask) = s:
        for each j in mask:
          dp[mask][j] = min_{k in mask \ {j}} dp[mask ^ bit(j)][k] + cost[k][j]
    answer = min_j dp[full_mask][j] + cost[j][0]

hints_l2: |
  - Do not attempt to parallelize across the full DP dependency graph at once. Use subset-cardinality frontiers.
  - Different graphs in the batch are independent and can be parallelized trivially.
  - Within one graph and one layer, states `(mask, j)` are independent once the previous layer is ready.
  - The inner predecessor minimization is a reduction over candidate predecessor cities.
  - Compacting masks by cardinality can substantially improve occupancy and avoid wasted work.

hints_l1: |
  - Treat `costs` as `costs[b * n * n + i * n + j]`.
  - Represent cities 1..n-1 with bits 0..n-2 in the mask.
  - Use two DP buffers (previous cardinality and current cardinality) or a single large DP table if memory allows.
  - Be careful that city 0 is not represented inside the subset mask.
  - The final answer includes the return edge from the last city back to city 0.
