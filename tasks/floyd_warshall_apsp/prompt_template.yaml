# Batched Floyd-Warshall APSP -- Prompt Template

task_description: |
  Compute exact all-pairs shortest-path distances for a batch of dense directed graphs using the Floyd-Warshall dynamic-programming algorithm.

  Each graph has N vertices and is represented by an `N x N` adjacency matrix with nonnegative integer edge weights.
  Missing edges are encoded as `INF`. Diagonal entries are zero. For each graph, produce the final APSP distance matrix after considering all intermediate vertices.

  Floyd-Warshall recurrence for each graph:

    for k in 0..N-1:
      for i in 0..N-1:
        for j in 0..N-1:
          dist[i,j] = min(dist[i,j], dist[i,k] + dist[k,j])

interface: |
  ```c
  extern "C" void solution_compute(
      int B,
      int N,
      int INF,
      const int* adj,   // host, [B*N*N], graph-major then row-major matrices
      int* out          // host, [B*N*N], final APSP matrices
  );

  extern "C" void solution_free(void);
  ```

input_size_notes: |
  - small:  8 graphs,  96 vertices each
  - medium: 12 graphs, 128 vertices each
  - large:  16 graphs, 160 vertices each
  - Layout for graph g: base = g * N * N
  - `adj[base + i*N + j]` is the edge weight from i to j
  - `INF` is a large sentinel for missing edges

output_contract: |
  - `out` must contain exact shortest-path distances for all ordered pairs in every graph
  - Output layout must match the input graph-major / row-major layout exactly
  - Distances are integers
  - The function must synchronize before returning

algorithm_background: |
  Floyd-Warshall is a classical dynamic program for APSP. At phase k, paths are allowed to use only intermediate vertices from the set {0,1,...,k}. The update for each pair (i, j) is independent within a fixed k phase, but all threads for phase k+1 must observe the fully updated matrix from phase k.

  For one graph, the core update is:
    through_k = dist[i,k] + dist[k,j]
    dist[i,j] = min(dist[i,j], through_k)

  Batched inputs add independent parallel work across graphs.

hints_l2: |
  - Copy the full batch of adjacency matrices to device memory at the start
  - Use one global distance buffer initialized from `adj`
  - Iterate over k on the host (or launch one phase per k) so phase ordering is preserved
  - Within each phase, parallelize over graph index and matrix cells
  - Copy the final distance matrices back to host at the end

hints_l1: |
  ### 1. Phase synchronization
  Floyd-Warshall requires a barrier between different `k` values. A simple and correct approach is one kernel launch per k.

  ### 2. Indexing
  Use:
    graph_stride = N * N
    base = g * graph_stride
    idx = base + i * N + j

  ### 3. Overflow safety
  Treat `INF` as a sentinel. Only evaluate `dist[i,k] + dist[k,j]` when both summands are strictly less than `INF`.

  ### 4. Optimization direction
  A stronger implementation can tile the matrix, cache pivot row/column segments, and map batched graphs across blocks.
