task_description: |
  Compute the best parse score for a batch of token sequences under a dense weighted CNF grammar using CYK/Viterbi chart parsing.

  The grammar has:
    - unary lexical scores `unary_scores[A, token]`
    - binary rule scores `binary_scores[A, B, C]` for productions `A -> B C`

  For each sentence of length `L`, define a chart over spans `[i, j)` and nonterminals `A`:
    dp[i, j, A] = maximum score of any parse rooted at A that derives tokens i..j-1

  Base case:
    dp[i, i+1, A] = unary_scores[A, tokens[i]]

  Recurrence for span length >= 2:
    dp[i, j, A] = max over split k in (i+1 .. j-1), B, C of
                  binary_scores[A, B, C] + dp[i, k, B] + dp[k, j, C]

  The output for one sentence is `dp[0, L, 0]`, where nonterminal 0 is the start symbol.

interface: |
  void solution_compute(int B, int N, int V, int L,
                        const int* binary_scores,
                        const int* unary_scores,
                        const int* tokens,
                        int* parse_scores_out);

input_size_notes: |
  - `B` is the number of sentences in the batch.
  - `N` is the number of nonterminals.
  - `V` is the vocabulary size.
  - `L` is the fixed sentence length for all batch items.
  - `binary_scores` stores `N * N * N` int32 scores in row-major order.
  - `unary_scores` stores `N * V` int32 scores in row-major order.
  - `tokens` stores `B * L` int32 token ids in row-major order.
  - The dynamic program has O(B * L^3 * N^3) work and is intentionally a high-difficulty benchmark.

output_contract: |
  - Write exactly `B` integers into `parse_scores_out`.
  - `parse_scores_out[b]` must equal the best parse score of sentence `b` rooted at start symbol 0.
  - Output order must match the batch order in `tokens`.
  - Results must be exact int32 values.

algorithm_background: |
  CYK parsing for CNF grammars is a classic interval DP.
  All spans of the same length are independent once smaller spans are available.
  The main work per chart cell is a max-reduction over split positions and child nonterminal pairs.

  Pseudocode for one sentence:
    for i in 0..L-1:
      for A in 0..N-1:
        dp[i, i+1, A] = unary_scores[A, tokens[i]]
    for len in 2..L:
      for i in 0..L-len:
        j = i + len
        for A in 0..N-1:
          best = -INF
          for k in i+1..j-1:
            for B in 0..N-1:
              for C in 0..N-1:
                best = max(best, binary_scores[A,B,C] + dp[i,k,B] + dp[k,j,C])
          dp[i,j,A] = best
    answer = dp[0, L, 0]

hints_l2: |
  - Process the chart by increasing span length. Do not violate this dependency order.
  - Parallelize across batch items and across independent chart cells of the same span length.
  - Each `(sentence, i, j, A)` cell performs a reduction over `k, B, C`.
  - Grammar tensors are reused heavily; cache or tile them carefully.
  - A full chart buffer is easiest to implement correctly; optimize memory layout only after correctness.

hints_l1: |
  - Treat `binary_scores[((A * N) + B) * N + C]` as the score for `A -> B C`.
  - Treat `unary_scores[A * V + token]` as the lexical score.
  - Treat `tokens[b * L + t]` as the token at position `t` of sentence `b`.
  - The answer for sentence `b` is the chart value at span `[0, L)` for nonterminal 0.
  - Use a very negative sentinel for impossible states if needed.
