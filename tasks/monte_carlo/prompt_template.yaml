# Monte Carlo Option Pricing -- Prompt Template

task_description: |
  Compute Monte Carlo option prices for N independent simulation paths using
  geometric Brownian motion. Each path simulates the underlying asset price over
  a number of time steps, then computes the discounted payoff of a put option.

  The simulation uses a deterministic xorshift32 RNG seeded per path, followed
  by a rational-approximation inverse normal CDF to generate Gaussian samples.
  Each path is completely independent, making this embarrassingly parallel on GPU.

  Based on FinanceBench (Scott Grauer-Gray et al.) Monte Carlo engine.

interface: |
  ```c
  // Called once to receive simulation parameters.
  extern "C" void solution_init(
      int N,                    // number of paths to simulate
      int num_steps,            // number of time steps per path (e.g. 252)
      float risk_free,          // risk-free interest rate
      float volatility,         // volatility (sigma)
      float strike,             // strike price K
      float spot,               // initial spot price S0
      float time_to_maturity,   // time to maturity in years
      unsigned int base_seed    // base seed for RNG
  );

  // Called multiple times (must be idempotent and synchronize before returning).
  // Compute discounted put payoff for each of the N paths.
  extern "C" void solution_compute(
      int N,                    // number of paths
      float* payoffs            // HOST [N]: output discounted payoffs
  );
  ```

input_size_notes: |
  | Size   | N (paths)    |
  |--------|-------------|
  | small  | 100,000     |
  | medium | 1,000,000   |
  | large  | 10,000,000  |

  - Each path is independent -- no data dependencies between paths
  - Parameters: spot=100, strike=100, rf=0.05, vol=0.2, T=1.0, steps=252
  - No large input arrays -- all parameters are scalar

output_contract: |
  - `payoffs[i]` = discounted put payoff for path i (float32)
  - Put payoff = max(strike - S_final, 0) * exp(-r * T)
  - Tolerance: atol=0.01, rtol=1e-4
  - `solution_compute` must be idempotent and synchronize before returning

algorithm_background: |
  **Monte Carlo Path Simulation (FinanceBench-style)**

  For each path i with parameters (S0, K, r, sigma, T, num_steps):

  1. Seed RNG: `state = base_seed ^ (i * 2654435761)`

  2. Initialize: `S = S0`, `dt = T / num_steps`

  3. For each time step j = 1..num_steps:
     a. Generate uniform random u via xorshift32:
        ```
        state ^= state << 13
        state ^= state >> 17
        state ^= state << 5
        u = state / 2^32
        ```
     b. Convert to normal sample via rational approximation:
        ```
        z = u - 0.5
        r = z * z
        norm = (((((A1*r+A2)*r+A3)*r+A4)*r+A5)*r+A6)*z /
               (((((B1*r+B2)*r+B3)*r+B4)*r+B5)*r+1)
        ```
     c. Evolve price using geometric Brownian motion:
        ```
        drift = (r_free - 0.5 * sigma^2) * dt
        diffusion = sigma * sqrt(dt) * norm
        S = S * exp(drift + diffusion)
        ```

  4. Compute discounted payoff:
     ```
     payoff = max(K - S, 0) * exp(-r * T)
     ```

hints_l2: |
  - Each path is independent -- one thread per path, trivially parallel
  - Use device-side RNG (xorshift32 is simple and fast on GPU)
  - Use fast math intrinsics: `__expf()`, `__logf()`, `rsqrtf()`
  - No input arrays to upload -- just scalar parameters
  - Pre-allocate output buffer on device in `solution_init`
  - The main loop (252 steps) is compute-bound with no memory access

hints_l1: |
  ### 1. Data Transfer Strategy
  In `solution_init`:
  - Store all scalar parameters
  - Allocate device buffer `d_payoffs` of size N

  In `solution_compute`:
  - Launch kernel with one thread per path
  - `cudaMemcpy` results back to host `payoffs`

  ### 2. Kernel Structure
  ```cuda
  __global__ void mc_kernel(int N, int num_steps, float risk_free,
                            float volatility, float strike, float spot,
                            float time_to_maturity, unsigned int base_seed,
                            float* payoffs) {
      int i = blockIdx.x * blockDim.x + threadIdx.x;
      if (i >= N) return;

      unsigned int state = base_seed ^ (unsigned int)(i * 2654435761u);
      if (state == 0) state = 1;

      float dt = time_to_maturity / (float)num_steps;
      float path_val = spot;

      for (int step = 1; step <= num_steps; step++) {
          state ^= state << 13;
          state ^= state >> 17;
          state ^= state << 5;
          float u = (float)state / 4294967296.0f;
          // clamp, inverse normal, evolve...
      }

      float payoff = fmaxf(strike - path_val, 0.0f);
      payoff *= __expf(-risk_free * time_to_maturity);
      payoffs[i] = payoff;
  }
  ```

  ### 3. Launch Configuration
  - 256 threads per block
  - Grid: `(N + 255) / 256` blocks
  - No shared memory needed
